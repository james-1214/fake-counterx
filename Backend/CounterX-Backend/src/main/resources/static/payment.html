<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Counter-X Payment</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

header{
    background:#28a745;
    color:white;
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    text-align:center;
}

h2{
    color:#28a745;
}

#items{
    text-align:left;
    margin-top:20px;
}

.qr img{
    width:220px;
    margin-top:20px;
}

.total{
    font-size:25px;
    margin-top:20px;
    font-weight:bold;
}

button{
    margin-top:25px;
    padding:12px 25px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:orange;
}

#txn{
    margin-top:20px;
    color:blue;
    font-size:20px;
}

</style>

</head>

<body>

<header>

Counter-X Payment

</header>

<div class="container">

<h2>QR Payment</h2>

<div id="items"></div>

<div class="total">

Total : ₹ <span id="total"></span>

</div>

<div class="qr">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=CounterXPayment">

</div>

<div id="txn"></div>

<button onclick="paymentSuccess()">

Payment Successful

</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total=0;

let html="";

cart.forEach(item=>{

html += "<p>"+item.name+" - ₹"+item.price+"</p>";

total += item.price;

});

document.getElementById("items").innerHTML=html;

document.getElementById("total").innerHTML=total;

function paymentSuccess(){

let transactionId="TXN"+Math.floor(Math.random()*100000000);

document.getElementById("txn").innerHTML=
"Transaction ID : "+transactionId;

localStorage.setItem("transactionId",transactionId);

localStorage.setItem("totalAmount",total);

setTimeout(function(){

window.location="bill.html";

},2000);

}

</script>

</body>

</html>
