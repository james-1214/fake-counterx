<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Counter-X Cart</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#28a745;
    color:white;
    text-align:center;
    padding:15px;
    font-size:28px;
}

.container{
    width:90%;
    margin:auto;
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#28a745;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
    border:1px solid #ddd;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.delete{
    background:red;
    color:white;
}

.delete:hover{
    background:darkred;
}

.clear{
    background:orange;
    color:white;
}

.order{
    background:#28a745;
    color:white;
}

.total{
    margin-top:20px;
    font-size:25px;
    font-weight:bold;
}

.action{
    margin-top:25px;
}

</style>

</head>

<body>

<header>

🛒 Counter-X Cart

</header>

<div class="container">

<table>

<thead>

<tr>

<th>Food</th>
<th>Price</th>
<th>Action</th>

</tr>

</thead>

<tbody id="cartTable">

</tbody>

</table>

<div class="total">

Total = ₹ <span id="total">0</span>

</div>

<div class="action">

<button class="clear" onclick="clearCart()">

Clear Cart

</button>

<button class="order" onclick="placeOrder()">

Place Order

</button>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

displayCart();

function displayCart(){

let table="";

let total=0;

cart.forEach((item,index)=>{

table +=`

<tr>

<td>${item.name}</td>

<td>₹${item.price}</td>

<td>

<button class="delete"
onclick="deleteItem(${index})">

Delete

</button>

</td>

</tr>

`;

total += item.price;

});

document.getElementById("cartTable").innerHTML=table;

document.getElementById("total").innerHTML=total;

}

function deleteItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

displayCart();

}

function clearCart(){

cart=[];

localStorage.removeItem("cart");

displayCart();

}

function placeOrder(){

if(cart.length==0){

alert("Cart is Empty");

return;

}

alert("Order Placed Successfully!");

window.location="payment.html";

}

</script>

</body>

</html>
