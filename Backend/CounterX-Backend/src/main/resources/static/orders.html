<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Counter-X Orders</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

header{
    background:#28a745;
    color:white;
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:95%;
    margin:auto;
    margin-top:30px;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
}

th{
    background:#28a745;
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.view{
    background:#007bff;
}

.delete{
    background:red;
}

button:hover{
    opacity:0.8;
}

</style>

</head>

<body>

<header>

Counter-X Order History

</header>

<div class="container">

<table>

<thead>

<tr>

<th>Order ID</th>
<th>Token No</th>
<th>Total Amount</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="orderTable">

</tbody>

</table>

</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

displayOrders();

function displayOrders(){

let html="";

if(orders.length==0){

html=`
<tr>
<td colspan="5">
No Orders Available
</td>
</tr>
`;

}

orders.forEach((order,index)=>{

html+=`

<tr>

<td>${order.orderId || index+1}</td>

<td>${order.token || "-"}</td>

<td>₹${order.total || 0}</td>

<td>${order.status || "Pending"}</td>

<td>

<button
class="view"
onclick="viewOrder(${index})">

View

</button>

<button
class="delete"
onclick="deleteOrder(${index})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById("orderTable").innerHTML=html;

}

function viewOrder(index){

let order=orders[index];

alert(

"Order ID : "+(order.orderId || index+1)+
"\nToken : "+order.token+
"\nTotal : ₹"+order.total+
"\nStatus : "+order.status

);

}

function deleteOrder(index){

if(confirm("Delete this Order?")){

orders.splice(index,1);

localStorage.setItem(
"orders",
JSON.stringify(orders)
);

displayOrders();

}

}

</script>

</body>

</html>
