<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Counter-X Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{

    background:#28a745;
    color:white;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;

}

.sidebar{

    position:fixed;
    left:0;
    top:70px;
    width:220px;
    height:100%;
    background:#222;
    padding-top:20px;

}

.sidebar a{

    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
    border-bottom:1px solid gray;

}

.sidebar a:hover{

    background:#28a745;

}

.main{

    margin-left:240px;
    padding:30px;

}

.cards{

    display:flex;
    flex-wrap:wrap;
    gap:20px;

}

.card{

    width:250px;
    background:white;
    border-radius:10px;
    box-shadow:0px 0px 8px gray;
    padding:20px;
    text-align:center;

}

.card h2{

    color:#28a745;
    margin-bottom:10px;

}

.card p{

    font-size:30px;
    font-weight:bold;

}

table{

    width:100%;
    background:white;
    margin-top:40px;
    border-collapse:collapse;

}

table th{

    background:#28a745;
    color:white;
    padding:10px;

}

table td{

    padding:10px;
    text-align:center;
    border:1px solid #ddd;

}

button{

    padding:8px 15px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;

}

button:hover{

    background:orange;

}

</style>

</head>

<body>

<header>

Counter-X Admin Dashboard

</header>

<div class="sidebar">

<a href="dashboard.html">Dashboard</a>

<a href="menu.html">Menu</a>

<a href="cart.html">Cart</a>

<a href="payment.html">Payment</a>

<a href="bill.html">Bill</a>

<a href="kitchen.html">Kitchen</a>

<a href="index.html">Logout</a>

</div>

<div class="main">

<h1>Dashboard</h1>

<br>

<div class="cards">

<div class="card">

<h2>Total Orders</h2>

<p id="orders">25</p>

</div>

<div class="card">

<h2>Total Revenue</h2>

<p id="revenue">₹8500</p>

</div>

<div class="card">

<h2>Pending Orders</h2>

<p id="pending">5</p>

</div>

<div class="card">

<h2>Completed</h2>

<p id="completed">20</p>

</div>

</div>

<table>

<tr>

<th>Order ID</th>
<th>Customer</th>
<th>Amount</th>
<th>Status</th>

</tr>

<tbody id="orderTable">

<tr>

<td>101</td>
<td>Rahul</td>
<td>₹250</td>
<td>Completed</td>

</tr>

<tr>

<td>102</td>
<td>Kiran</td>
<td>₹320</td>
<td>Preparing</td>

</tr>

<tr>

<td>103</td>
<td>Ravi</td>
<td>₹150</td>
<td>Pending</td>

</tr>

</tbody>

</table>

</div>

*/

</script>

</body>

</html>
